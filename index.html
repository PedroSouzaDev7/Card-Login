<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=vpn_key,person" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="estilo/style.css" media="all">
    <link rel="stylesheet" href="estilo/media-query.css">
</head>
<body>
    <main>
        <div class="img">
        </div>
        <div class="form">  
            <h1>Login</h1>
            <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
            <form action="form.php" method="post" autocomplete="off">
                
                <div class="campo">
                    <div class="email">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <input type="email" name="email" id="inEmail" autocomplete="on" required placeholder="Seu Email">
                        <label for="inEmail">Email</label>
                    </div>
                    <div class="senha">
                        <span class="material-symbols-outlined">person</span>
                        <input type="password" name="senha" id="inSenha" required autocomplete="current-password" maxlength="8" placeholder="Sua Senha">
                        <label for="inSenha">Senha</label>
                    </div>
                </div>

                <input type="submit" value="Entrar">
                <a href="esqueci.html" class="button">Esqueci a Senha<span class="material-symbols-outlined">email</span></a>
                
            </form>
        </div>
    </main>
</body>
</html>
